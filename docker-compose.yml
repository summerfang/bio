services:
  dev:
    build:
      context: .
      target: dev
    ports:
      - "${PORT:-5173}:${PORT:-5173}"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=${PORT:-5173}

  test:
    build:
      context: .
      target: test
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
